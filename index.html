<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aizak</title>

  <style>

    h1, p, .menu a {
  text-shadow:
    0 0 2px rgba(0,0,0,0.8),
    0 0 6px rgba(0,0,0,0.6);
}

.menu a {
  position: relative;
  display: inline-block;
  padding: 5px 10px;
}

.menu a::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.1);
  opacity: 0;
  transition: 0.2s;
  z-index: -1;
}

.menu a:hover::before {
  opacity: 1;
}

  .main-text {
  position: absolute;
  left: 6%;
  top: 50%;
  transform: translateY(-50%);
  
  width: 30vw;
  min-width: 300px;

  text-align: left;
  z-index: 2;
}



@font-face {
  font-family: 'MyFont';
  src: url('fonts/Century Gothic Italic.ttf');
}

    html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: 'MyFont', sans-serif;
  letter-spacing: 10px;
}

    video {
  position: fixed;
  top: 0;
  left: 40%;
  width: 60%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

    h1 {
      font-size: 6vw;
      letter-spacing: 10px;
    }

    .menu {
      margin-top: 40px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px;
      font-size: 20px;
      opacity: 0.7;
    }

    .menu a:hover {
      opacity: 1;
    }
  </style>
</head>




<body>







<video autoplay muted loop playsinline>
    <source src="Video/bg.mp4" type="video/mp4">
  </video>


  <div class="main-text">
  <h1>AIZAK</h1>
  <p>"Aizak" is an electronic music focused project created by Rokas Miceika. "Aizak" is focused on raw energy, emotion, and immersive soundscapes, drawing influence from dance, rave and experimental electronic scenes.</p>

</div>
</body>

</html>
