<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aizak</title>

<style>



@font-face {
  font-family: 'MyFont';
  src: url('fonts/CenturyGothicItalic.ttf');
}



html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;

  background: black;
  color: white;

  font-family: 'MyFont', sans-serif;
  letter-spacing: 4px;
}



body::before {
  content: "";

  position: fixed;
  top: 0;
  left: 0;

  width: 30%;
  height: 100vh;

  background: black;

  z-index: -1;
}



video {
  position: fixed;

  top: 0;
  left: 30%;

  width: 70%;
  height: 100vh;

  object-fit: cover;

  z-index: -2;
}



.main-text {
  position: absolute;

  left: 5%;
  top: 50%;

  transform: translateY(-50%);

  width: 22vw;
  min-width: 320px;

  z-index: 2;

  text-align: left;
}



h1 {
  margin: 0;

  font-size: clamp(60px, 6vw, 120px);

  letter-spacing: 10px;

  text-shadow:
    0 0 3px rgba(0,0,0,0.8),
    0 0 8px rgba(0,0,0,0.6);
}



p {
  margin-top: 20px;

  font-size: 14px;
  line-height: 1.8;

  text-shadow:
    0 0 3px rgba(0,0,0,0.8),
    0 0 8px rgba(0,0,0,0.6);
}



.menu {
  margin-top: 40px;
}

.menu a {
  position: relative;

  display: block;

  width: fit-content;

  margin: 12px 0;
  padding: 6px 10px;

  color: white;

  text-decoration: none;

  font-size: 18px;

  opacity: 0.7;

  transition: 0.2s;

  text-shadow:
    0 0 3px rgba(0,0,0,0.8),
    0 0 8px rgba(0,0,0,0.6);
}



.menu a::before {
  content: "";

  position: absolute;
  inset: 0;

  background: rgba(255,255,255,0.08);

  opacity: 0;

  transition: 0.2s;

  z-index: -1;
}

.menu a:hover::before {
  opacity: 1;
}

.menu a:hover {
  opacity: 1;
}



.audio-controls {
  position: fixed;

  top: 20px;
  right: 20px;

  display: flex;
  align-items: center;
  gap: 10px;

  z-index: 10;
}

.audio-controls button {
  background: black;

  color: white;

  border: 1px solid white;

  padding: 5px 10px;

  font-family: 'MyFont';

  cursor: pointer;
}

.audio-controls input[type="range"] {
  width: 80px;
}

</style>
</head>

<body>



<video autoplay muted loop playsinline>
  <source src="Video/bg.mp4" type="video/mp4">
</video>



<audio id="bg-music" loop>
  <source src="Muzika/bg-music.mp3" type="audio/mpeg">
</audio>



<div class="audio-controls">
  <button id="muteBtn">mute</button>

  <input
    type="range"
    id="volumeSlider"
    min="0"
    max="1"
    step="0.01"
  >
</div>



<div class="main-text">

  <h1>AIZAK</h1>

  <p>
    "Aizak" is an electronic music focused project created by
    Rokas Miceika. "Aizak" is focused on raw energy,
    emotion, and immersive soundscapes, drawing influence
    from dance, rave and experimental electronic scenes.
  </p>

  <div class="menu">
    <a href="music.html">music</a>

    <a href="visuals.html">visuals</a>

    <a href="contact.html">contact</a>
  </div>

</div>



<script>

const music = document.getElementById("bg-music");
const muteBtn = document.getElementById("muteBtn");
const volumeSlider = document.getElementById("volumeSlider");



music.volume = 0.2;
volumeSlider.value = 0.2;



document.body.addEventListener("click", () => {
  music.play();
}, { once: true });



muteBtn.addEventListener("click", () => {

  music.muted = !music.muted;

  muteBtn.textContent =
    music.muted ? "unmute" : "mute";
});



volumeSlider.addEventListener("input", () => {

  music.volume = volumeSlider.value;

});

</script>

</body>
</html>
```
